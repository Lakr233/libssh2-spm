name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macOS
          - macOS,variant=Mac Catalyst
          - iOS
          - iOS Simulator
          - tvOS
          - tvOS Simulator
          - watchOS
          - watchOS Simulator
          - xrOS
          - xrOS Simulator
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme CSSH2 \
            -destination "generic/platform=${{ matrix.platform }}" \
            | xcbeautify

  test:
    name: Test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test -scheme CSSH2 \
            -destination "platform=macOS" \
            | xcbeautify
